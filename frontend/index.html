<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TheMiddleMen</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    
    <!-- Navigation -->
    <nav class="dashboard-nav">
        <div class="container nav-content">
            <div class="brand text-gradient">TheMiddleMen Dashboard</div>
            <button onclick="logout()" class="btn btn-secondary" style="width: auto;">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div id="alertBox" class="alert"></div>

        <div class="dashboard-grid">
            
            <!-- Channel Info Card -->
            <div class="glass-card">
                <div class="card-header">
                    <h2>Channel Info</h2>
                </div>
                <div id="channel-content" class="loading-container">
                    <div class="loader"></div>
                    <p>Loading channel details...</p>
                </div>
            </div>

            <!-- Videos Info Card -->
            <div class="glass-card">
                <div class="card-header">
                    <h2>Recent Videos</h2>
                </div>
                <div id="video-content" class="loading-container">
                    <div class="loader"></div>
                    <p>Loading videos...</p>
                </div>
            </div>

            <!-- Playlist Info Card -->
            <div class="glass-card">
                <div class="card-header">
                    <h2>Upload Playlist</h2>
                </div>
                <div id="playlist-content" class="loading-container">
                    <div class="loader"></div>
                    <p>Loading playlist...</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
